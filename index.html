<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superbvise</title>
    <meta
      name="description"
      content="AI supervision and monitoring platform."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --text: #f5f7ff;
        --muted: #a9b4d0;
        --accent: #6ea8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #162447, var(--bg));
        color: var(--text);
      }

      main {
        max-width: 640px;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2.5rem, 8vw, 4rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.125rem;
        line-height: 1.6;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Superbvise</h1>
      <p>
        AI supervision and monitoring platform.<br />
        More coming soon.
      </p>
    </main>
  </body>
</html>
