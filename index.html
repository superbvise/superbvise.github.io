<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperbVise.ai</title>
    <meta
      name="description"
      content="AI supervision and monitoring platform."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #060912;
        --text: #f4f6ff;
        --muted: #9aa8cc;
        --accent: #6ea8ff;
        --accent-hot: #a78bfa;
        --glow: rgba(110, 168, 255, 0.45);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        overflow-x: hidden;
        font-family: "Outfit", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(110, 168, 255, 0.18), transparent 55%),
          radial-gradient(ellipse 70% 50% at 80% 20%, rgba(167, 139, 250, 0.14), transparent 50%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(56, 189, 248, 0.08), transparent 45%),
          var(--bg);
      }

      .bg::before {
        content: "";
        position: absolute;
        inset: -50%;
        background: conic-gradient(
          from 0deg at 50% 50%,
          transparent 0deg,
          rgba(110, 168, 255, 0.06) 60deg,
          transparent 120deg,
          rgba(167, 139, 250, 0.06) 200deg,
          transparent 280deg
        );
        animation: spin 28s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #particles {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        animation: float 12s ease-in-out infinite;
      }

      .orb-1 {
        width: 320px;
        height: 320px;
        background: rgba(110, 168, 255, 0.25);
        top: 10%;
        left: -5%;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 280px;
        height: 280px;
        background: rgba(167, 139, 250, 0.2);
        top: 55%;
        right: -8%;
        animation-delay: -4s;
      }

      .orb-3 {
        width: 200px;
        height: 200px;
        background: rgba(56, 189, 248, 0.15);
        bottom: 5%;
        left: 30%;
        animation-delay: -8s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -25px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(110, 168, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(110, 168, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
        animation: gridPulse 6s ease-in-out infinite;
      }

      @keyframes gridPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem 4rem;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 1rem;
        margin-bottom: 2rem;
        border: 1px solid rgba(110, 168, 255, 0.25);
        border-radius: 999px;
        background: rgba(110, 168, 255, 0.08);
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.2s;
      }

      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 12px #34d399;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.7;
        }
      }

      h1 {
        font-size: clamp(3rem, 12vw, 5.5rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.05;
        margin-bottom: 1.25rem;
      }

      .brand {
        display: inline-block;
      }

      .brand .char {
        display: inline-block;
        color: #f4f6ff;
      }

      .brand .char.v {
        color: var(--accent-hot);
        text-shadow:
          0 0 24px rgba(167, 139, 250, 0.8),
          0 0 48px rgba(167, 139, 250, 0.35);
      }

      .brand .char.domain {
        color: var(--muted);
        font-weight: 300;
      }

      .tagline {
        max-width: 520px;
        font-size: clamp(1.05rem, 3vw, 1.35rem);
        font-weight: 300;
        line-height: 1.65;
        color: var(--muted);
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.55s;
      }

      .tagline strong {
        color: var(--text);
        font-weight: 500;
      }

      .cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-top: 2.5rem;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.85s;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 1.6rem;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .cta-primary {
        color: var(--bg);
        background: linear-gradient(135deg, var(--accent), var(--accent-hot));
        box-shadow: 0 8px 32px var(--glow);
        animation: ctaGlow 3s ease-in-out infinite;
      }

      @keyframes ctaGlow {
        0%,
        100% {
          box-shadow: 0 8px 32px var(--glow);
        }
        50% {
          box-shadow: 0 8px 48px rgba(167, 139, 250, 0.5);
        }
      }

      .cta-primary:hover {
        transform: translateY(-2px) scale(1.02);
      }

      .cta-ghost {
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
      }

      .cta-ghost:hover {
        transform: translateY(-2px);
        border-color: rgba(110, 168, 255, 0.4);
        background: rgba(110, 168, 255, 0.08);
      }

      .metrics {
        display: flex;
        gap: 2.5rem;
        margin-top: 3.5rem;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 1.1s;
      }

      .metric {
        text-align: center;
      }

      .metric-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .metric-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-top: 0.25rem;
      }

      .wave {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 120px;
        z-index: 0;
        opacity: 0.4;
      }

      .wave svg {
        width: 100%;
        height: 100%;
      }

      .wave path {
        animation: waveMove 8s ease-in-out infinite;
      }

      @keyframes waveMove {
        0%,
        100% {
          d: path("M0,64 C240,120 480,20 720,64 C960,108 1200,40 1440,64 L1440,120 L0,120 Z");
        }
        50% {
          d: path("M0,80 C240,30 480,100 720,50 C960,0 1200,90 1440,70 L1440,120 L0,120 Z");
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .char {
        display: inline-block;
        opacity: 0;
        animation: charIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes charIn {
        from {
          opacity: 0;
          transform: translateY(30px) rotateX(-40deg);
        }
        to {
          opacity: 1;
          transform: translateY(0) rotateX(0);
        }
      }

      @media (max-width: 540px) {
        .metrics {
          gap: 1.5rem;
        }

        .metric-value {
          font-size: 1.2rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }

        #particles {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <canvas id="particles"></canvas>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid"></div>
    </div>

    <div class="wave" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
        <path
          fill="rgba(110,168,255,0.08)"
          d="M0,64 C240,120 480,20 720,64 C960,108 1200,40 1440,64 L1440,120 L0,120 Z"
        />
      </svg>
    </div>

    <main>
      <div class="badge">
        <span class="badge-dot"></span>
        Now live
      </div>

      <h1 aria-label="SuperbVise.ai">
        <span class="brand" id="brand"></span>
      </h1>

      <p class="tagline">
        <strong>AI supervision and monitoring</strong> for teams building
        reliable, observable AI systems. Something extraordinary is on the way.
      </p>

      <div class="cta-row">
        <a class="cta cta-primary" href="mailto:hello@superbvise.ai">
          Get in touch
          <span aria-hidden="true">→</span>
        </a>
        <a
          class="cta cta-ghost"
          href="https://github.com/superbvise"
          target="_blank"
          rel="noopener noreferrer"
        >
          GitHub
        </a>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-value" data-target="24">0</div>
          <div class="metric-label">/ 7 Monitoring</div>
        </div>
        <div class="metric">
          <div class="metric-value" data-target="100">0</div>
          <div class="metric-label">% Visibility</div>
        </div>
        <div class="metric">
          <div class="metric-value" data-target="1">0</div>
          <div class="metric-label">Platform</div>
        </div>
      </div>
    </main>

    <script>
      const brandText = [
        { t: "S", d: 0 },
        { t: "u", d: 1 },
        { t: "p", d: 2 },
        { t: "e", d: 3 },
        { t: "r", d: 4 },
        { t: "b", d: 5 },
        { t: "V", d: 6, cls: "v" },
        { t: "i", d: 7 },
        { t: "s", d: 8 },
        { t: "e", d: 9 },
        { t: ".", d: 10, cls: "domain" },
        { t: "a", d: 11, cls: "domain" },
        { t: "i", d: 12, cls: "domain" },
      ];

      const brandEl = document.getElementById("brand");
      brandText.forEach(({ t, d, cls }) => {
        const span = document.createElement("span");
        span.className = "char" + (cls ? " " + cls : "");
        span.textContent = t;
        span.style.animationDelay = `${0.35 + d * 0.06}s`;
        brandEl.appendChild(span);
      });

      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let particles = [];
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function initParticles() {
        particles = Array.from({ length: Math.min(80, Math.floor(w / 14)) }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.35,
          vy: (Math.random() - 0.5) * 0.35,
          a: Math.random() * 0.5 + 0.15,
        }));
      }

      function drawParticles() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(110,168,255,${p.a})`;
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = `rgba(110,168,255,${0.12 * (1 - dist / 100)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        });
        requestAnimationFrame(drawParticles);
      }

      window.addEventListener("resize", () => {
        resize();
        initParticles();
      });
      resize();
      initParticles();
      drawParticles();

      document.querySelectorAll(".metric-value").forEach((el) => {
        const target = +el.dataset.target;
        const suffix = el.parentElement.querySelector(".metric-label").textContent.includes("%")
          ? "%"
          : el.parentElement.querySelector(".metric-label").textContent.includes("/")
            ? "/7"
            : "";
        const start = performance.now();
        const duration = 1800;

        function tick(now) {
          const t = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          const val = Math.round(eased * target);
          el.textContent = suffix === "/7" ? val + suffix : val + suffix;
          if (t < 1) requestAnimationFrame(tick);
        }

        setTimeout(() => requestAnimationFrame(tick), 1200);
      });
    </script>
  </body>
</html>
