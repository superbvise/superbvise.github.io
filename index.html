<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperbVise.ai</title>
    <!-- deploy: 2026-06-13-hero-v2 -->
    <meta
      name="description"
      content="Agentic data annotation and self-improvement. Humans and agents, in the loop."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #060912;
        --text: #f4f6ff;
        --muted: #9aa8cc;
        --accent: #6ea8ff;
        --accent-hot: #a78bfa;
        --accent-cyan: #22d3ee;
        --accent-rose: #fb7185;
        --glow: rgba(110, 168, 255, 0.45);
        --glow-violet: rgba(167, 139, 250, 0.55);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        overflow-x: hidden;
        font-family: "Outfit", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(110, 168, 255, 0.18), transparent 55%),
          radial-gradient(ellipse 70% 50% at 80% 20%, rgba(167, 139, 250, 0.14), transparent 50%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(56, 189, 248, 0.08), transparent 45%),
          var(--bg);
      }

      .bg::before {
        content: "";
        position: absolute;
        inset: -50%;
        background: conic-gradient(
          from 0deg at 50% 50%,
          transparent 0deg,
          rgba(110, 168, 255, 0.06) 60deg,
          transparent 120deg,
          rgba(167, 139, 250, 0.06) 200deg,
          transparent 280deg
        );
        animation: spin 28s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #particles {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.5;
        animation: float 12s ease-in-out infinite;
      }

      .orb-1 {
        width: 320px;
        height: 320px;
        background: rgba(110, 168, 255, 0.25);
        top: 10%;
        left: -5%;
        animation-delay: 0s;
      }

      .orb-2 {
        width: 280px;
        height: 280px;
        background: rgba(167, 139, 250, 0.2);
        top: 55%;
        right: -8%;
        animation-delay: -4s;
      }

      .orb-3 {
        width: 200px;
        height: 200px;
        background: rgba(56, 189, 248, 0.15);
        bottom: 5%;
        left: 30%;
        animation-delay: -8s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -25px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(110, 168, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(110, 168, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
        animation: gridPulse 6s ease-in-out infinite;
      }

      @keyframes gridPulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem 4rem;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 1rem;
        margin-bottom: 2rem;
        border: 1px solid rgba(110, 168, 255, 0.25);
        border-radius: 999px;
        background: rgba(110, 168, 255, 0.08);
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.2s;
      }

      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 12px #34d399;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.7;
        }
      }

      .wordmark {
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        background: linear-gradient(90deg, var(--accent), var(--accent-hot));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.15s;
      }

      .hero {
        max-width: 780px;
        margin-bottom: 2rem;
        opacity: 0;
        animation: fadeUp 0.9s ease forwards 0.3s;
      }

      .hero-line {
        display: block;
        font-size: clamp(2rem, 7vw, 3.4rem);
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.15;
      }

      .hero-line + .hero-line {
        margin-top: 0.35rem;
      }

      .hero-muted {
        color: rgba(154, 168, 204, 0.55);
        text-decoration: line-through;
        text-decoration-color: rgba(251, 113, 133, 0.45);
        text-decoration-thickness: 2px;
      }

      .hero-accent {
        font-size: clamp(2.4rem, 9vw, 4.2rem);
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .hero-superb {
        color: #f4f6ff;
      }

      .hero-v {
        color: var(--accent-hot);
        text-shadow:
          0 0 20px var(--glow-violet),
          0 0 50px rgba(167, 139, 250, 0.35);
      }

      .hero-it {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .tagline-wrap {
        position: relative;
        max-width: 620px;
        padding: 1.35rem 1.75rem;
        border-radius: 20px;
        border: 1px solid rgba(110, 168, 255, 0.14);
        background: linear-gradient(
          135deg,
          rgba(110, 168, 255, 0.07),
          rgba(167, 139, 250, 0.05)
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 20px 60px rgba(0, 0, 0, 0.35);
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.55s;
      }

      .tagline-wrap::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 21px;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(110, 168, 255, 0.35),
          rgba(167, 139, 250, 0.15),
          rgba(34, 211, 238, 0.25)
        );
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask-composite: exclude;
        pointer-events: none;
      }

      .tagline {
        font-size: clamp(1.05rem, 3vw, 1.28rem);
        font-weight: 300;
        line-height: 1.75;
        color: var(--muted);
      }

      .tagline .hl-cyan {
        color: var(--accent-cyan);
        font-weight: 500;
      }

      .tagline .hl-violet {
        color: var(--accent-hot);
        font-weight: 500;
      }

      .tagline .hl-blue {
        color: var(--accent);
        font-weight: 500;
      }

      .tagline .hl-loop {
        display: inline-block;
        padding: 0.1em 0.45em;
        border-radius: 999px;
        color: #f4f6ff;
        font-weight: 500;
        background: linear-gradient(
          135deg,
          rgba(110, 168, 255, 0.22),
          rgba(167, 139, 250, 0.22)
        );
        box-shadow: 0 0 24px rgba(110, 168, 255, 0.15);
      }

      .cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-top: 2.5rem;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.85s;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 1.6rem;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .cta-primary {
        color: var(--bg);
        background: linear-gradient(135deg, var(--accent), var(--accent-hot));
        box-shadow: 0 8px 32px var(--glow);
        animation: ctaGlow 3s ease-in-out infinite;
      }

      @keyframes ctaGlow {
        0%,
        100% {
          box-shadow: 0 8px 32px var(--glow);
        }
        50% {
          box-shadow: 0 8px 48px rgba(167, 139, 250, 0.5);
        }
      }

      .cta-primary:hover {
        transform: translateY(-2px) scale(1.02);
      }

      .cta-ghost {
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
      }

      .cta-ghost:hover {
        transform: translateY(-2px);
        border-color: rgba(110, 168, 255, 0.4);
        background: rgba(110, 168, 255, 0.08);
      }

      .metrics {
        display: flex;
        gap: 2.5rem;
        margin-top: 3.5rem;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 1.1s;
      }

      .metric {
        text-align: center;
      }

      .metric-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .metric-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-top: 0.25rem;
      }

      .wave {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 120px;
        z-index: 0;
        opacity: 0.4;
      }

      .wave svg {
        width: 100%;
        height: 100%;
      }

      .wave path {
        animation: waveMove 8s ease-in-out infinite;
      }

      @keyframes waveMove {
        0%,
        100% {
          d: path("M0,64 C240,120 480,20 720,64 C960,108 1200,40 1440,64 L1440,120 L0,120 Z");
        }
        50% {
          d: path("M0,80 C240,30 480,100 720,50 C960,0 1200,90 1440,70 L1440,120 L0,120 Z");
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 540px) {
        .tagline-wrap {
          padding: 1.1rem 1.25rem;
        }

        .hero-line {
          font-size: clamp(1.75rem, 8vw, 2.5rem);
        }

        .hero-accent {
          font-size: clamp(2rem, 10vw, 3rem);
        }
        .metrics {
          gap: 1.5rem;
        }

        .metric-value {
          font-size: 1.2rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }

        #particles {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <canvas id="particles"></canvas>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="grid"></div>
    </div>

    <div class="wave" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
        <path
          fill="rgba(110,168,255,0.08)"
          d="M0,64 C240,120 480,20 720,64 C960,108 1200,40 1440,64 L1440,120 L0,120 Z"
        />
      </svg>
    </div>

    <main>
      <div class="badge">
        <span class="badge-dot"></span>
        Now live
      </div>

      <p class="wordmark">SuperbVise.ai</p>

      <h1 class="hero">
        <span class="hero-line">
          Don't <span class="hero-muted">supervise</span> it.
        </span>
        <span class="hero-line hero-accent">
          <span class="hero-superb">Superb</span><span class="hero-v">V</span><span class="hero-superb">ise</span>
          <span class="hero-it"> it.</span>
        </span>
      </h1>

      <div class="tagline-wrap">
        <p class="tagline">
          <span class="hl-cyan">Agentic data annotation</span> and
          <span class="hl-violet">self-improvement</span>.<br />
          <span class="hl-blue">Humans</span> and
          <span class="hl-violet">agents</span>, in the
          <span class="hl-loop">loop</span>.
        </p>
      </div>

      <div class="cta-row">
        <a class="cta cta-primary" href="mailto:superbvise@gmail.com">
          Get in touch
          <span aria-hidden="true">→</span>
        </a>
        <a
          class="cta cta-ghost"
          href="https://github.com/superbvise"
          target="_blank"
          rel="noopener noreferrer"
        >
          GitHub
        </a>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-value" data-target="100" data-suffix="%">0</div>
          <div class="metric-label">Agentic</div>
        </div>
        <div class="metric">
          <div class="metric-value" data-text="H+A">—</div>
          <div class="metric-label">Human + Agent</div>
        </div>
        <div class="metric">
          <div class="metric-value" data-text="∞">—</div>
          <div class="metric-label">Self-improve</div>
        </div>
      </div>
    </main>

    <script>
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let particles = [];
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function initParticles() {
        particles = Array.from({ length: Math.min(80, Math.floor(w / 14)) }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.35,
          vy: (Math.random() - 0.5) * 0.35,
          a: Math.random() * 0.5 + 0.15,
        }));
      }

      function drawParticles() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(110,168,255,${p.a})`;
          ctx.fill();

          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = `rgba(110,168,255,${0.12 * (1 - dist / 100)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        });
        requestAnimationFrame(drawParticles);
      }

      window.addEventListener("resize", () => {
        resize();
        initParticles();
      });
      resize();
      initParticles();
      drawParticles();

      document.querySelectorAll(".metric-value").forEach((el) => {
        if (el.dataset.text) {
          el.textContent = el.dataset.text;
          return;
        }

        const target = +el.dataset.target;
        const suffix = el.dataset.suffix || "";
        const start = performance.now();
        const duration = 1800;

        function tick(now) {
          const t = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          el.textContent = Math.round(eased * target) + suffix;
          if (t < 1) requestAnimationFrame(tick);
        }

        setTimeout(() => requestAnimationFrame(tick), 1200);
      });
    </script>
  </body>
</html>
